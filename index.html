<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>list</title>
    <link rel="manifest" id="manifestLink">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="list">
    <meta name="theme-color" content="#1E0547">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            --pink: #FF8FAB;
            --pink-light: #FFD6E0;
            --pink-dark: #C9596E;
            --bg: #FFF5F7;
            --card: #FFFFFF;
            --gray: #888888;
            --gray-light: #F5F5F5;
            --text: #2D2D2D;
            --border: #FFE0EA;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        html, body { height:100%; overflow:hidden; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); }

        /* ======= SETUP SCREEN ======= */
        #setupScreen {
            min-height:100vh; padding:48px 28px 36px;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            background:linear-gradient(160deg, #0D0129 0%, #1A0440 50%, #2D0A6B 100%);
        }

        .setup-logo {
            font-size:72px; margin-bottom:14px; animation:beat 2.4s infinite;
            filter: grayscale(1) brightness(0.1) contrast(5);
        }
        @keyframes beat { 0%,100%{transform:scale(1)} 30%{transform:scale(1.07)} 60%{transform:scale(1)} 80%{transform:scale(1.04)} }

        .setup-title {
            font-family: 'Great Vibes', cursive;
            font-size:54px; font-weight:400;
            color:#E2D0FF; letter-spacing:2px;
        }
        .setup-sub { font-size:13px; color:rgba(255,255,255,0.4); margin:10px 0 44px; line-height:1.8; text-align:center; }

        .setup-step { width:100%; display:none; }
        .setup-step.active { display:block; }

        .big-btn {
            width:100%; padding:17px; border-radius:16px;
            font-size:16px; font-weight:700; border:none; cursor:pointer;
            margin-bottom:12px; transition:all .2s; font-family:inherit;
        }
        .big-btn:active { transform:scale(.97); }
        .big-btn.primary { background:#7C3AED; color:#fff; box-shadow:0 4px 22px rgba(124,58,237,.55); }
        .big-btn.secondary { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.85); border:1.5px solid rgba(155,108,248,0.35); }

        .code-box {
            background:rgba(255,255,255,0.07); border:2px dashed rgba(155,108,248,0.45);
            border-radius:20px; padding:24px; margin:18px 0;
        }
        .code-box .lbl { font-size:12px; color:rgba(255,255,255,0.45); margin-bottom:8px; }
        .code-box .code { font-size:40px; font-weight:900; letter-spacing:10px; color:#C4A9FF; }
        .code-box .hint { font-size:12px; color:rgba(255,255,255,0.35); margin-top:10px; line-height:1.6; }

        .code-input {
            width:100%; padding:16px; border:2px solid rgba(155,108,248,0.3);
            border-radius:16px; font-size:24px; font-weight:700;
            text-align:center; letter-spacing:8px; outline:none;
            margin-bottom:14px; font-family:inherit; text-transform:uppercase;
            background:rgba(255,255,255,0.08); color:#fff;
        }
        .code-input::placeholder { color:rgba(255,255,255,0.25); }
        .code-input:focus { border-color:#9B6CF8; }
        .back-link { color:rgba(255,255,255,0.38); font-size:14px; cursor:pointer; margin-top:6px; display:inline-block; padding:8px; }

        /* ======= MAIN APP ======= */
        #mainApp { display:none; flex-direction:column; height:100vh; height:-webkit-fill-available; }

        .header {
            background:#fff; border-bottom:1px solid var(--border);
            padding:calc(var(--safe-top) + 14px) 16px 14px;
            display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0;
        }
        .header-title { font-size:20px; font-weight:800; color:#6D28D9; letter-spacing:-0.5px; }
        .header-code {
            position:absolute; right:14px;
            font-size:11px; font-weight:700; color:var(--pink-dark);
            background:var(--bg); padding:4px 10px; border-radius:10px;
            cursor:pointer; border:1px solid var(--pink-light);
        }

        .content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(68px + var(--safe-bottom)); }

        .tab-panel { display:none; padding:16px; }
        .tab-panel.active { display:block; }

        .panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .panel-title { font-size:21px; font-weight:800; }

        .plus-btn {
            width:38px; height:38px; border-radius:50%;
            background:var(--pink); color:#fff; border:none; font-size:22px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            box-shadow:0 3px 10px rgba(255,143,171,.45); transition:all .2s; flex-shrink:0;
        }
        .plus-btn:active { transform:scale(.87); }

        /* Bottom Nav */
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0;
            background:#fff; border-top:1px solid var(--border);
            display:flex; padding-bottom:var(--safe-bottom); z-index:100;
        }
        .nav-btn {
            flex:1; display:flex; flex-direction:column; align-items:center;
            padding:10px 0 6px; cursor:pointer; background:none; border:none; transition:all .18s;
        }
        .nav-icon { font-size:22px; margin-bottom:3px; transition:transform .2s; }
        .nav-label { font-size:11px; color:var(--gray); font-weight:500; }
        .nav-btn.active .nav-label { color:var(--pink); font-weight:700; }
        .nav-btn.active .nav-icon { transform:scale(1.12); }

        /* List Item */
        .list-item {
            background:#fff; border-radius:18px; padding:12px 14px;
            margin-bottom:10px; border:1px solid var(--border);
            cursor:pointer; transition:all .18s;
        }
        .list-item:active { transform:scale(.975); }

        .item-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
        .item-main { flex:1; overflow:hidden; }
        .item-title { font-size:15px; font-weight:700; color:var(--text); line-height:1.3; }
        .item-title.done { text-decoration:line-through; color:#aaa; }
        .item-date { font-size:11px; color:var(--gray); }
        .item-footer { display:flex; justify-content:flex-end; margin-top:5px; }
        .item-review { font-size:13px; color:var(--gray); margin-top:3px; font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .item-stars { margin-top:5px; font-size:14px; }
        .item-photos { display:flex; gap:5px; margin-top:8px; overflow:hidden; }
        .item-thumb { width:52px; height:52px; border-radius:10px; object-fit:cover; flex-shrink:0; }

        /* Side photos (spot / dining) */
        .item-side-photos { display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
        .item-thumb-side { width:60px; height:60px; border-radius:10px; object-fit:cover; flex-shrink:0; display:block; }
        .side-more { width:60px; height:60px; border-radius:10px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:11px; color:#aaa; flex-shrink:0; }

        .check-btn {
            width:26px; height:26px; border-radius:50%; border:2.5px solid var(--pink-light);
            background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
            flex-shrink:0; transition:all .2s; font-size:13px; color:#fff;
        }
        .check-btn.done { background:var(--pink); border-color:var(--pink); }
        .del-btn { background:none; border:none; color:#ddd; font-size:16px; cursor:pointer; padding:2px 0 2px 4px; flex-shrink:0; }
        .del-btn:active { color:#FF5C5C; }

        /* Empty */
        .empty { text-align:center; padding:60px 20px; }
        .empty-emoji { font-size:52px; margin-bottom:12px; }
        .empty-msg { font-size:14px; color:var(--gray); line-height:1.7; }

        /* ======= MODALS ======= */
        .overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.48);
            z-index:300; display:flex; align-items:flex-end;
            opacity:0; pointer-events:none; transition:opacity .28s;
        }
        .overlay.open { opacity:1; pointer-events:all; }

        .sheet {
            background:#fff; border-radius:24px 24px 0 0;
            width:100%; max-height:92vh; overflow-y:auto;
            -webkit-overflow-scrolling:touch;
            padding:0 22px calc(20px + var(--safe-bottom));
            transform:translateY(100%); transition:transform .3s ease;
        }
        .overlay.open .sheet { transform:translateY(0); }

        .sheet-handle { width:44px; height:5px; background:#E0E0E0; border-radius:3px; margin:14px auto 18px; flex-shrink:0; }
        .sheet-title { font-size:18px; font-weight:800; color:var(--text); margin-bottom:18px; padding-right:30px; }

        .detail-close {
            position:absolute; right:14px; top:12px;
            width:32px; height:32px; border-radius:50%;
            background:var(--gray-light); border:none; font-size:15px;
            cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10;
        }

        .form-label { font-size:13px; font-weight:700; color:var(--gray); margin-bottom:7px; display:block; }

        .form-input {
            width:100%; padding:13px 15px; border:1.5px solid var(--border);
            border-radius:14px; font-size:15px; font-family:inherit;
            outline:none; background:var(--bg); margin-bottom:18px; color:var(--text);
        }
        .form-input:focus { border-color:var(--pink); }

        .form-textarea {
            width:100%; min-height:90px; padding:13px 15px;
            border:1.5px solid var(--border); border-radius:14px;
            font-size:15px; font-family:inherit; outline:none;
            resize:none; background:var(--bg); margin-bottom:18px; color:var(--text);
        }
        .form-textarea:focus { border-color:var(--pink); }

        /* Star Rating */
        .star-wrap { display:flex; gap:6px; margin-bottom:18px; }
        .star-btn { font-size:30px; background:none; border:none; cursor:pointer; line-height:1; transition:transform .1s; padding:0; }
        .star-btn:active { transform:scale(1.35); }

        /* Bucket toggle */
        .check-row {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px; background:var(--bg); border-radius:14px; margin-bottom:18px; cursor:pointer;
        }
        .check-circle {
            width:28px; height:28px; border-radius:50%; border:2.5px solid var(--pink-light);
            display:flex; align-items:center; justify-content:center;
            font-size:14px; flex-shrink:0; transition:all .2s; color:#fff;
        }
        .check-circle.done { background:var(--pink); border-color:var(--pink); }
        .check-lbl { font-size:15px; font-weight:600; }

        /* Photo Grid */
        .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
        .photo-wrap { aspect-ratio:1; border-radius:12px; overflow:hidden; position:relative; }
        .photo-wrap img { width:100%; height:100%; object-fit:cover; }
        .photo-del {
            position:absolute; top:4px; right:4px;
            width:22px; height:22px; border-radius:50%;
            background:rgba(0,0,0,.55); color:#fff; border:none;
            font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer;
        }
        .add-photo {
            aspect-ratio:1; border-radius:12px; border:2px dashed var(--pink-light);
            background:#FFF8FA; display:flex; flex-direction:column;
            align-items:center; justify-content:center; cursor:pointer;
            color:var(--pink-light); font-size:26px; transition:all .2s;
        }
        .add-photo span { font-size:10px; margin-top:2px; color:var(--pink-light); }
        .add-photo:active { background:var(--pink-light); }

        /* Action Row */
        .action-row { display:flex; gap:10px; margin-top:4px; padding-bottom:4px; }
        .save-btn {
            flex:1; padding:15px; border-radius:14px;
            background:var(--pink); color:#fff; border:none;
            font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s;
        }
        .save-btn:active { transform:scale(.97); background:var(--pink-dark); }
        .del-action-btn {
            padding:15px 18px; border-radius:14px;
            background:#FFF0F0; color:#FF5C5C; border:none;
            font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;
        }

        /* Add Sheet */
        .add-input {
            width:100%; padding:14px 16px; border:2px solid var(--border);
            border-radius:14px; font-size:16px; font-family:inherit;
            outline:none; background:var(--bg); margin-bottom:12px; color:var(--text);
        }
        .add-input:focus { border-color:var(--pink); }
        .add-confirm {
            width:100%; padding:15px; border-radius:14px;
            background:var(--pink); color:#fff; border:none;
            font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s;
        }
        .add-confirm:active { transform:scale(.97); }

        /* Toast */
        .toast {
            position:fixed; bottom:calc(88px + var(--safe-bottom)); left:50%;
            transform:translateX(-50%) translateY(10px);
            background:rgba(30,30,30,.88); color:#fff;
            padding:10px 22px; border-radius:22px; font-size:14px; font-weight:500;
            opacity:0; transition:all .25s; z-index:999; white-space:nowrap; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* Warning */
        .warn-box {
            background:#FFF3CD; border:1px solid #FFD060;
            border-radius:14px; padding:14px 16px;
            font-size:13px; color:#7A5800; margin-bottom:20px; line-height:1.6;
            width:100%;
        }
    </style>
</head>
<body>

<!-- ========== SETUP SCREEN ========== -->
<div id="setupScreen">
    <div class="setup-logo">🖤</div>
    <h1 class="setup-title">our record</h1>
    <p class="setup-sub">두 사람만의 특별한 공간<br>함께 만들어가는 소중한 추억</p>

    <!-- Step 1 -->
    <div class="setup-step active" id="step1">
        <button class="big-btn primary" onclick="showStep('create')">💝 새로운 커플 코드 만들기</button>
        <button class="big-btn secondary" onclick="showStep('join')">🔑 파트너 코드 입력하기</button>
    </div>

    <!-- Step Create -->
    <div class="setup-step" id="stepCreate">
        <div class="code-box">
            <div class="lbl">📋 커플 코드</div>
            <div class="code" id="genCode">------</div>
            <div class="hint">파트너에게 이 코드를 알려주세요<br>파트너도 같은 코드를 입력하면 연결돼요</div>
        </div>
        <button class="big-btn primary" onclick="startWithCode(document.getElementById('genCode').textContent)">시작하기 →</button>
        <div class="back-link" onclick="showStep('1')">← 돌아가기</div>
    </div>

    <!-- Step Join -->
    <div class="setup-step" id="stepJoin">
        <input type="text" class="code-input" id="joinInput" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
        <button class="big-btn primary" onclick="joinWithCode()">연결하기 →</button>
        <div class="back-link" onclick="showStep('1')">← 돌아가기</div>
    </div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="mainApp">
    <div class="header">
        <span class="header-title">list</span>
        <span class="header-code" id="headerCode" onclick="copyCode()">복사</span>
    </div>

    <div class="content" id="mainContent">
        <!-- Bucket List -->
        <div class="tab-panel active" id="tab-bucket">
            <div class="panel-header">
                <span class="panel-title">⭐ Bucket List</span>
                <button class="plus-btn" onclick="openAdd('bucket')">+</button>
            </div>
            <div id="bucket-list"></div>
        </div>

        <!-- Spot List -->
        <div class="tab-panel" id="tab-spot">
            <div class="panel-header">
                <span class="panel-title">📍 Spot List</span>
                <button class="plus-btn" onclick="openAdd('spot')">+</button>
            </div>
            <div id="spot-list"></div>
        </div>

        <!-- Dining List -->
        <div class="tab-panel" id="tab-dining">
            <div class="panel-header">
                <span class="panel-title">🍽️ Dining List</span>
                <button class="plus-btn" onclick="openAdd('dining')">+</button>
            </div>
            <div id="dining-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-bucket" onclick="switchTab('bucket')">
            <span class="nav-icon">⭐</span>
            <span class="nav-label">Bucket</span>
        </button>
        <button class="nav-btn" id="nav-spot" onclick="switchTab('spot')">
            <span class="nav-icon">📍</span>
            <span class="nav-label">Spot</span>
        </button>
        <button class="nav-btn" id="nav-dining" onclick="switchTab('dining')">
            <span class="nav-icon">🍽️</span>
            <span class="nav-label">Dining</span>
        </button>
    </nav>
</div>

<!-- ========== ADD MODAL ========== -->
<div class="overlay" id="addOverlay" onclick="if(event.target===this)closeAdd()">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="addTitle">추가하기</div>
        <input type="text" class="add-input" id="addInput" placeholder="제목을 입력하세요" onkeydown="if(event.key==='Enter')confirmAdd()">
        <button class="add-confirm" onclick="confirmAdd()">추가하기 ✨</button>
    </div>
</div>

<!-- ========== DETAIL MODAL ========== -->
<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="sheet" style="position:relative;">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="sheet-handle"></div>
        <div id="detailContent"></div>
    </div>
</div>

<!-- Toast & File Input -->
<div class="toast" id="toast"></div>
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="onPhotoFile(event)">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ==============================================================
// 🔥 FIREBASE 설정 - 아래 값들을 Firebase 콘솔에서 복사해서 넣으세요
// ==============================================================
const firebaseConfig = {
    apiKey:            "AIzaSyC1amehq6MFCcA2ZyMqOjQY1v067xv7Xh0",
    authDomain:        "list-6773f.firebaseapp.com",
    databaseURL:       "https://list-6773f-default-rtdb.firebaseio.com",
    projectId:         "list-6773f",
    storageBucket:     "list-6773f.firebasestorage.app",
    messagingSenderId: "607880224551",
    appId:             "1:607880224551:web:d303a9a177b9b7ad111302"
};
// ==============================================================

let db = null;
try {
    if (!firebaseConfig.apiKey.startsWith('REPLACE')) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }
} catch(e) { console.error('Firebase init error:', e); }

// ─── State ───────────────────────────────────────
let coupleCode     = null;
let currentTab     = 'bucket';
let data           = { bucket:{}, spot:{}, dining:{} };
let addType        = null;
let detailType     = null;
let detailId       = null;
let detailItem     = null;
let detailOpen     = false;
let toastTimer     = null;

// ─── Setup ───────────────────────────────────────
function showStep(s) {
    document.querySelectorAll('.setup-step').forEach(el => el.classList.remove('active'));
    if (s === 'create') {
        document.getElementById('genCode').textContent = genCode();
        document.getElementById('stepCreate').classList.add('active');
    } else if (s === 'join') {
        document.getElementById('joinInput').value = '';
        document.getElementById('stepJoin').classList.add('active');
    } else {
        document.getElementById('step1').classList.add('active');
    }
}

function genCode() {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length:6}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

function joinWithCode() {
    const v = document.getElementById('joinInput').value.trim();
    if (v.length < 4) { showToast('코드를 입력해주세요'); return; }
    startWithCode(v);
}

function startWithCode(code) {
    if (!db) { showToast('Firebase 설정이 필요합니다'); return; }
    coupleCode = code;
    localStorage.setItem('coupleCode', code);
    initApp();
}

// ─── App Init ───────────────────────────────────
function initApp() {
    document.getElementById('setupScreen').style.display = 'none';
    const app = document.getElementById('mainApp');
    app.style.display = 'flex';
    app.style.flexDirection = 'column';
    document.getElementById('headerCode').textContent = '🔑 ' + coupleCode;

    db.ref('couples/' + coupleCode).on('value', snap => {
        const raw = snap.val() || {};
        data.bucket = raw.bucket || {};
        data.spot   = raw.spot   || {};
        data.dining = raw.dining || {};
        renderAll();
    }, err => { showToast('연결 오류: ' + err.message); });
}

function copyCode() {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(coupleCode).then(() => showToast('코드 복사됨! 📋'));
    } else { showToast('코드: ' + coupleCode); }
}

// ─── Navigation ─────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    document.getElementById('mainContent').scrollTop = 0;
}

// ─── Render ─────────────────────────────────────
function renderAll() {
    renderList('bucket');
    renderList('spot');
    renderList('dining');
}

function renderList(type) {
    const el = document.getElementById(type + '-list');
    const items = data[type] || {};
    const sorted = Object.entries(items).sort((a,b) => (b[1].dateAdded||'') > (a[1].dateAdded||'') ? 1 : -1);

    if (!sorted.length) {
        const icons = {bucket:'⭐', spot:'🗺️', dining:'🍴'};
        const msgs  = {bucket:'Add your first\nbucket list!', spot:'Add a place\nyou want to visit!', dining:'Add a restaurant\nyou want to try!'};
        el.innerHTML = `<div class="empty"><div class="empty-emoji">${icons[type]}</div><div class="empty-msg">${msgs[type]}</div></div>`;
        return;
    }
    el.innerHTML = sorted.map(([id, item]) => itemHTML(type, id, item)).join('');
}

function itemHTML(type, id, item) {
    const date   = item.dateAdded ? new Date(item.dateAdded).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '';
    const photos = Array.isArray(item.photos) ? item.photos : [];

    let inner = '';
    if (type === 'bucket') {
        const done = !!item.completed;
        inner = `
            <div class="item-row">
                <div class="item-title${done?' done':''}">${esc(item.title)}</div>
                <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
                    <button class="del-btn" onclick="event.stopPropagation();delItem('bucket','${id}')">✕</button>
                    <button class="check-btn${done?' done':''}" onclick="event.stopPropagation();toggleDone('${id}',${done})">${done?'✓':''}</button>
                </div>
            </div>
            ${item.description ? `<div class="item-review">${esc(item.description)}</div>` : ''}
            <div class="item-footer"><span class="item-date">${date}</span></div>`;
    } else {
        const r = item.rating || 0;
        const sidePhotos = photos.length
            ? `<div class="item-side-photos">
                ${photos.slice(0,2).map(p => `<img class="item-thumb-side" src="${p}" alt="">`).join('')}
                ${photos.length > 2 ? `<div class="side-more">+${photos.length-2}</div>` : ''}
               </div>` : '';
        inner = `
            <div class="item-row" style="align-items:stretch;">
                <div class="item-main">
                    <div class="item-title">${esc(item.title)}</div>
                    <div class="item-stars">${[1,2,3,4,5].map(i => i<=r?'⭐':'☆').join('')}</div>
                    ${item.review ? `<div class="item-review">"${esc(item.review)}"</div>` : ''}
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0;padding-left:10px;min-height:54px;">
                    <button class="del-btn" onclick="event.stopPropagation();delItem('${type}','${id}')">✕</button>
                    ${sidePhotos}
                    <span class="item-date">${date}</span>
                </div>
            </div>`;
    }

    // bucket: photos below / spot+dining: photos already on the right inside inner
    const bottomPhotos = (type === 'bucket' && photos.length)
        ? `<div class="item-photos">${photos.slice(0,3).map(p=>`<img class="item-thumb" src="${p}" alt="">`).join('')}${photos.length>3?`<div class="item-thumb" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;border-radius:10px;">+${photos.length-3}</div>`:''}</div>`
        : '';

    return `<div class="list-item" onclick="openDetail('${type}','${id}')">${inner}${bottomPhotos}</div>`;
}

// ─── Add Modal ──────────────────────────────────
function openAdd(type) {
    addType = type;
    const labels = {bucket:'Add Bucket ⭐', spot:'Add Spot 📍', dining:'Add Dining 🍽️'};
    document.getElementById('addTitle').textContent = labels[type];
    document.getElementById('addInput').value = '';
    document.getElementById('addOverlay').classList.add('open');
    setTimeout(() => document.getElementById('addInput').focus(), 350);
}

function closeAdd() { document.getElementById('addOverlay').classList.remove('open'); }

function confirmAdd() {
    const title = document.getElementById('addInput').value.trim();
    if (!title) { showToast('제목을 입력해주세요'); return; }
    const id = Date.now().toString();
    db.ref('couples/' + coupleCode + '/' + addType + '/' + id).set({
        title, dateAdded:new Date().toISOString(),
        completed:false, description:'', review:'', rating:0, photos:[]
    }).then(() => showToast('추가됐어요! ✨')).catch(() => showToast('오류가 발생했어요'));
    closeAdd();
}

// ─── Detail Modal ───────────────────────────────
function openDetail(type, id) {
    detailType = type;
    detailId   = id;
    detailItem = JSON.parse(JSON.stringify(data[type][id] || {}));
    if (!Array.isArray(detailItem.photos)) detailItem.photos = [];
    detailOpen = true;
    renderDetail();
    document.getElementById('detailOverlay').classList.add('open');
}

function renderDetail() {
    const t = detailType, it = detailItem;
    const photos = it.photos || [];

    const photoGrid = `
        <div class="photo-grid">
            ${photos.map((p,i) => `<div class="photo-wrap"><img src="${p}" alt=""><button class="photo-del" onclick="removePhoto(${i})">✕</button></div>`).join('')}
            <div class="add-photo" onclick="pickPhoto()"><span>+</span><span>사진</span></div>
        </div>`;

    let html = '';
    if (t === 'bucket') {
        const done = !!it.completed;
        html = `
            <div class="sheet-title">${esc(it.title)}</div>
            <div class="check-row" onclick="toggleDetailDone()">
                <div class="check-circle${done?' done':''}" id="dCircle">${done?'✓':''}</div>
                <span class="check-lbl" id="dLabel">${done?'완료했어요! 🎉':'아직 완료 전이에요'}</span>
            </div>
            <label class="form-label">메모 📝</label>
            <textarea class="form-textarea" id="dDesc" placeholder="기록을 남겨보세요..." oninput="detailItem.description=this.value">${esc(it.description||'')}</textarea>
            <label class="form-label">사진 📸</label>
            ${photoGrid}
            <div class="action-row">
                <button class="save-btn" onclick="saveDetail()">저장하기 💾</button>
                <button class="del-action-btn" onclick="deleteDetail()">삭제</button>
            </div>`;
    } else {
        const r = it.rating || 0;
        html = `
            <div class="sheet-title">${esc(it.title)}</div>
            <label class="form-label">평점 ⭐</label>
            <div class="star-wrap" id="starWrap">
                ${[1,2,3,4,5].map(i => `<button class="star-btn" onclick="setRating(${i})">${i<=r?'⭐':'☆'}</button>`).join('')}
            </div>
            <label class="form-label">한줄평 ✍️</label>
            <input type="text" class="form-input" id="dReview" placeholder="한 줄 소감을 남겨보세요" value="${esc(it.review||'')}" oninput="detailItem.review=this.value">
            <label class="form-label">사진 📸</label>
            ${photoGrid}
            <div class="action-row">
                <button class="save-btn" onclick="saveDetail()">저장하기 💾</button>
                <button class="del-action-btn" onclick="deleteDetail()">삭제</button>
            </div>`;
    }
    document.getElementById('detailContent').innerHTML = html;
}

function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('open');
    detailOpen = false;
}

function toggleDetailDone() {
    detailItem.completed = !detailItem.completed;
    const c = document.getElementById('dCircle'), l = document.getElementById('dLabel');
    if (c) { c.className = 'check-circle' + (detailItem.completed?' done':''); c.textContent = detailItem.completed?'✓':''; }
    if (l) { l.textContent = detailItem.completed ? '완료했어요! 🎉' : '아직 완료 전이에요'; }
}

function setRating(n) {
    detailItem.rating = n;
    const w = document.getElementById('starWrap');
    if (w) w.innerHTML = [1,2,3,4,5].map(i => `<button class="star-btn" onclick="setRating(${i})">${i<=n?'⭐':'☆'}</button>`).join('');
}

function saveDetail() {
    db.ref('couples/' + coupleCode + '/' + detailType + '/' + detailId).update({
        description: detailItem.description || '',
        review:      detailItem.review      || '',
        rating:      detailItem.rating      || 0,
        completed:   detailItem.completed   || false,
        photos:      detailItem.photos      || []
    }).then(() => {
        showToast('저장됐어요! 💾');
        closeDetail();
    }).catch(() => showToast('저장 오류'));
}

function deleteDetail() {
    if (!confirm('삭제할까요?')) return;
    db.ref('couples/' + coupleCode + '/' + detailType + '/' + detailId).remove()
        .then(() => { showToast('삭제됐어요'); closeDetail(); });
}

// ─── Quick Actions ──────────────────────────────
function toggleDone(id, current) {
    db.ref('couples/' + coupleCode + '/bucket/' + id + '/completed').set(!current);
}

function delItem(type, id) {
    if (!confirm('삭제할까요?')) return;
    db.ref('couples/' + coupleCode + '/' + type + '/' + id).remove()
        .then(() => showToast('삭제됐어요'));
}

// ─── Photos ─────────────────────────────────────
function pickPhoto() { document.getElementById('photoInput').click(); }

function onPhotoFile(e) {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = '';
    showToast('사진 추가 중...');
    compressImg(file).then(b64 => {
        detailItem.photos.push(b64);
        renderDetail();
        showToast('사진 추가됨 📸');
    });
}

function removePhoto(i) {
    detailItem.photos.splice(i,1);
    renderDetail();
}

function compressImg(file, maxW=500, q=0.65) {
    return new Promise(resolve => {
        const r = new FileReader();
        r.onload = ev => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > maxW) { h = Math.round(h*maxW/w); w = maxW; }
                const c = document.createElement('canvas');
                c.width = w; c.height = h;
                c.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(c.toDataURL('image/jpeg', q));
            };
            img.src = ev.target.result;
        };
        r.readAsDataURL(file);
    });
}

// ─── Utils ──────────────────────────────────────
function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2300);
}

// ─── Start ──────────────────────────────────────
window.addEventListener('load', () => {
    if (!db) {
        const w = document.createElement('div');
        w.className = 'warn-box';
        w.innerHTML = '⚠️ <b>Firebase 설정 필요</b><br>index.html 파일의 firebaseConfig 값을 Firebase 콘솔에서 복사한 실제 값으로 교체해주세요.';
        document.getElementById('setupScreen').insertBefore(w, document.querySelector('.setup-logo'));
    }

    coupleCode = localStorage.getItem('coupleCode');
    if (coupleCode && db) {
        initApp();
    }
});

// ── 아이콘 동적 생성 (캔버스로 PNG 생성) ──
(function() {
    try {
        const c = document.createElement('canvas');
        c.width = 180; c.height = 180;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#7C3AED';
        const r = 36;
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(180-r,0); ctx.arcTo(180,0,180,r,r);
        ctx.lineTo(180,180-r); ctx.arcTo(180,180,180-r,180,r);
        ctx.lineTo(r,180); ctx.arcTo(0,180,0,180-r,r);
        ctx.lineTo(0,r); ctx.arcTo(0,0,r,0,r);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = 'bold 58px -apple-system,BlinkMacSystemFont,Helvetica Neue,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('list', 90, 92);
        const link = document.createElement('link');
        link.rel = 'apple-touch-icon';
        link.href = c.toDataURL('image/png');
        document.head.appendChild(link);
    } catch(e) {}
})();

(function() {
    try {
        const m = { name:'list', short_name:'list', start_url:'./', display:'standalone',
            background_color:'#FFF5F7', theme_color:'#FF8FAB',
            icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="%237C3AED"/><text x="256" y="256" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-weight="800" font-size="172" fill="white">list</text></svg>',sizes:'any',type:'image/svg+xml'}]
        };
        const blob = new Blob([JSON.stringify(m)], {type:'application/manifest+json'});
        document.getElementById('manifestLink').href = URL.createObjectURL(blob);
    } catch(e) {}
})();

// ── 서비스 워커 (인라인 블롭) ──
if ('serviceWorker' in navigator) {
    try {
        const sw = `self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));`;
        const blob = new Blob([sw], {type:'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
    } catch(e) {}
}
